<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <title>Moppe</title>
    <style>
      html,
      body,
      canvas {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #08100d;
      }

      canvas {
        display: block;
        outline: none;
      }

      #status {
        position: fixed;
        left: 1rem;
        bottom: 1rem;
        color: #dcebdd;
        font: 13px ui-monospace, monospace;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas" tabindex="0"></canvas>
    <div id="status">Loading Moppe…</div>
    <script>
      const status = document.getElementById("status")
      const query = new URLSearchParams(window.location.search)
      const terrainQuality = query.get("terrain") || "fast"
      const graphicsQuality = query.get("graphics") || "low"
      const seed = query.get("seed") || "123"
      var Module = {
        canvas: document.getElementById("canvas"),
        arguments: [
          "--terrain-quality",
          terrainQuality,
          "--graphics-quality",
          graphicsQuality,
          "--graphics-enable",
          "ocean,terrain-shadows",
          "--seed",
          seed,
        ],
        print: (text) => console.log(text),
        printErr: (text) => {
          console.error(text)
          status.textContent = text
        },
        onRuntimeInitialized: () => {
          status.textContent = "Starting WebGPU…"
        },
      }
    </script>
    {{{ SCRIPT }}}
  </body>
</html>
